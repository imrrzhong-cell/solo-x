  <style>
    :root {

      {slug:'ai-toolbox-for-solo-creators',type:'Note',title:'AI 工具箱的边界',excerpt:'工具不是越多越好，真正的工具箱要围绕稳定任务链展开，减少切换和重复劳动。',tags:['工具箱','效率','AI'],date:'2026-04-12',read:'9 min',premium:false,body:['工具箱的价值不来自数量，而来自任务链覆盖率。一个工具不能进入稳定任务链，它就只是玩具。','一人公司最关键的工具链通常只有五条：研究、写作、设计、开发、分发。每条链只保留最少但最强的工具。','工具选择的最终标准是：能不能减少一个固定动作的认知成本。']},
      {slug:'from-content-to-product',type:'Essay',title:'从内容走向产品',excerpt:'内容给你信任，产品给你收入。两者之间缺少的是可重复交付的结果。',tags:['产品化','内容创业'],date:'2026-03-30',read:'15 min',premium:true,body:['内容创业者最容易停在表达层。表达可以建立吸引力，但很难稳定变现。','产品化的关键，是把读者反复出现的问题转化成明确结果，再把这个结果封装为工具、课程、模板或服务。','内容负责解释问题，产品负责解决问题。只有两者形成回路，个人品牌才会进入商业状态。']},

      {slug:'smidgeon-pattern-recognition',type:'Smidgeon',title:'模式识别的成本',excerpt:'识别模式本身不难，难的是把模式压缩成别人也能复用的结构。',tags:['灵感','认知'],date:'2026-04-04',read:'4 min',premium:false,body:['很多人以为模式识别是一种灵感能力，其实它更接近压缩能力。','你要把大量现象压成一个可迁移结构，然后再把结构翻译成可执行动作。','无法被别人使用的模式，只是私人感受。']},

      <section class="section alt"><div class="container">${sectionHeader('运营路径','从一个人，到一个系统','先有稳定动作，再有长期复利。')}<div class="pathway"><div class="step"><div class="step-num">01</div><h3>定位</h3><p>确定长期母题、目标用户和可承受的最小市场。</p></div><div class="step"><div class="step-num">02</div><h3>内容</h3><p>建立文章、视频、工具说明书的稳定表达资产。</p></div><div class="step"><div class="step-num">03</div><h3>工具</h3><p>把高频动作封装为轻量工具，降低交付成本。</p></div><div class="step"><div class="step-num">04</div><h3>产品</h3><p>把方法论转为课程、应用、会员和咨询权益。</p></div><div class="step"><div class="step-num">05</div><h3>复利</h3><p>用公开建设、邮件和社群沉淀长期信任。</p></div></div></div></section>${ink('∞')}

    function pageHead(kicker,title,desc,kanji){return `<header class="page-head"><div class="container"><div class="eyebrow">${kicker}</div><h1 class="page-title">${title}</h1><p class="page-desc">${desc}</p><div class="page-kanji">${kanji}</div></div></header>`}
    function renderArticles(filter='全部'){const types=['全部','Essay','Note','Tool','Smidgeon','Now Update'];const list=filter==='全部'?articles:articles.filter(a=>a.type===filter);return `${pageHead('深度文章','把一人公司的判断，写成可复用资产。','文章系统承载成熟长文、成长中的想法、工具推荐、碎片灵感和月度动态。每篇文章都指向一个可执行问题。','文')}<section class="section"><div class="container"><div class="tabs" id="articleTabs">${types.map(t=>`<button class="tab ${t===filter?'active':''}" data-filter="${t}">${t}</button>`).join('')}</div><div class="article-list">${list.map(a=>`<a class="article-card" href="#/article/${a.slug}"><div><div class="article-meta">${a.type} · ${a.premium?'PRO':'FREE'}</div><h2 class="article-title">${a.title}</h2><p class="article-excerpt">${a.excerpt}</p><div class="tag-row">${a.tags.map(tag=>`<span class="tag">${tag}</span>`).join('')}</div></div><div class="article-side"><div>${a.date}</div><div>${a.read}</div></div></a>`).join('')}</div></div></section>`}
    function renderArticle(slug){const a=articles.find(x=>x.slug===slug)||articles[0];return `<article class="prose-wrap"><div class="prose-kicker">${a.type} · ${a.premium?'PRO MEMBER':'FREE READ'}</div><h1 class="prose-title">${a.title}</h1><div class="prose-meta">${a.date} · ${a.read} · ${a.tags.join(' / ')}</div><div class="prose"><blockquote>${a.excerpt}</blockquote>${a.body.map((p,i)=>i===1?`<h2>${i===1?'核心判断':'延展'}</h2><p>${p}</p>`:`<p>${p}</p>`).join('')}<h2>可执行结论</h2><p>把这篇文章当成一个工具使用：找到一个正在重复发生的问题，写下你当前的判断，提炼一个动作模板，然后在下一次任务中验证它。</p><pre><code>task = repeated_problem
model = judgment_pattern(task)
asset = package(model, output='article / tool / course')
ship(asset)</code></pre></div><div style="margin-top:2.5rem" class="button-row"><a class="btn-plain" href="#/articles">← 返回文章列表</a><a class="btn-sage" href="#/pricing">查看会员计划</a></div><div style="margin-top:3rem">${newsletter()}</div></article>`}
    function catalogPage(kind){const dict={music:['原创音乐','声音，是内容的第二条线。','为视频、课程和品牌叙事而写的音乐资产。','音',music,'TRACKS'],courses:['视频课程','OPC 方法论系统教程。','把定位、内容、工具、产品、分发和复盘连成可执行路径。','课',courses,'LESSONS'],apps:['微信小程序','移动端的轻量效率入口。','让一人公司的日常动作在微信场景里可记录、可调用。','用',apps,'MINI APPS'],webapps:['网页应用','把方法论做成工具。','AI 写作、品牌命名、GEO 体检和销售页生成器等 Web 工具。','器',webapps,'WEB TOOLS'],games:['创意游戏','把抽象方法论做成体验。','用轻量游戏训练选题、定价、产品化和现金流判断。','戏',games,'PLAY']};const d=dict[kind];return `${pageHead(d[5],d[0],d[2],d[3])}<section class="section"><div class="container"><div class="content-grid">${d[4].map((x,i)=>`<a class="ct-item" href="${kind==='courses'?'#/course/'+(i+1):'#/'+kind}"><span class="ct-index">${['壹','贰','叁','肆','伍','陆','柒','捌'][i]}</span><div class="ct-type">${d[5]}</div><h3 class="ct-name">${x[0]}</h3><p class="ct-desc">${x[2]||x[1]}</p><div class="ct-foot"><span class="ct-count">${kind==='music'?x[1]:'第 '+(i+1)+' 单元'}</span><span class="ct-price ${i%3===0?'price-free':'price-paid'}">${i%3===0?'FREE':'PRO'}</span></div></a>`).join('')}</div></div></section><section class="section alt"><div class="container">${newsletter()}</div></section>`}
    function courseDetail(id){const idx=(Number(id)||1)-1;const c=courses[idx]||courses[0];return `${pageHead('COURSE DETAIL',`课程 ${idx+1} · ${c[0]}`,c[1],'课')}<section class="section"><div class="container split"><div class="panel"><h2 class="panel-title">学习目标</h2><p class="panel-desc">本课目标是把「${c[0]}」从抽象概念转化为一套可执行动作，最终沉淀为一人公司长期可复用资产。</p><ul class="plain-list"><li>理解核心问题和常见误区</li><li>建立可操作的判断框架</li><li>完成一份本节课对应产物</li></ul></div><div class="panel off"><h2 class="panel-title">课程结构</h2><ul class="plain-list"><li>概念拆解：从现象回到机制</li><li>案例观察：真实一人公司场景</li><li>工作流：输入、处理、输出</li><li>作业：生成你的专属版本</li></ul><a class="btn-sage" href="#/pricing" style="margin-top:1.5rem">解锁完整课程</a></div></div></section>`}
    function toolsPage(){return `${pageHead('OPC工具箱','十八款工具，服务一条任务链。','工具箱覆盖定位、研究、写作、产品、销售、运营和复盘。每个工具都围绕一人公司高频任务设计。','器')}<section class="section"><div class="container"><div class="tools-grid">${tools.map(toolCard).join('')}</div></div></section>`}
    function toolDetail(id){const t=tools.find(x=>x.id===id)||tools[0];return `${pageHead(`${t.tier} TOOL`,t.name,t.desc,'器')}<section class="section"><div class="container"><div class="feature-band"><div><h2 class="band-title">工具工作流</h2><p class="band-desc">输入足够少，输出足够可用。工具只解决一个清晰问题。</p></div><div class="mini-grid"><div class="mini"><b>输入</b><span>目标、素材、约束和当前阶段。</span></div><div class="mini"><b>处理</b><span>基于 OPC 模型完成判断和压缩。</span></div><div class="mini"><b>输出</b><span>可复制、可执行、可迭代的结果。</span></div></div></div></div></section><section class="section alt"><div class="container split"><div class="panel"><h2 class="panel-title">适用场景</h2><ul class="plain-list"><li>你需要快速完成 ${t.cat} 类任务</li><li>你不想从空白文档重新开始</li><li>你希望把判断沉淀为稳定流程</li></ul></div><div class="panel"><h2 class="panel-title">访问权限</h2><p class="panel-desc">当前工具为 ${t.tier} 权限。免费工具可直接使用，Pro 工具属于创作者及年度会员权益。</p><div class="button-row" style="margin-top:1.5rem"><a class="btn-sage" href="#/pricing">查看会员</a><a class="btn-plain" href="#/tools">返回工具箱 →</a></div></div></div></section>`}
    function pricingPage(){return `${pageHead('会员计划','免费进入，深入同行。','三档会员对应三种状态：探索、使用、长期共建。价格层级同时决定内容、工具、课程和社群权益边界。','会')}<section class="section"><div class="container">${priceCards()}</div></section><section class="section alt"><div class="container">${sectionHeader('权益边界','每一档都有清晰任务','不堆砌权益，只服务下一步。')}<div class="content-grid"><div class="ct-item"><span class="ct-index">阅</span><div class="ct-type">EXPLORER</div><h3 class="ct-name">看懂方向</h3><p class="ct-desc">适合第一次进入 SOLO.X 的用户，先通过文章和基础工具判断这里是否值得长期关注。</p></div><div class="ct-item"><span class="ct-index">用</span><div class="ct-type">CREATOR</div><h3 class="ct-name">开始使用</h3><p class="ct-desc">适合正在做内容、产品或工具的人，直接使用完整工具箱和课程。</p></div><div class="ct-item"><span class="ct-index">共</span><div class="ct-type">ANNUAL</div><h3 class="ct-name">长期同行</h3><p class="ct-desc">适合把一人公司作为长期方向的人，获得报告、问答和优先体验。</p></div></div></div></section>`}
    function aboutPage(){return `${pageHead('关于 SOLO.X','一个人，也可以成为完整系统。','SOLO.X 由独立开发者、内容创作者和 AI 工具制造者创建。它不是作品集，而是一个持续公开建设的一人公司样本。','独')}<section class="section"><div class="container split"><div class="panel"><h2 class="panel-title">身份</h2><p class="panel-desc">独立开发者、内容创作者、AI 工具制造者。长期关注如何把技术、内容和商业压缩到一个可持续运行的个人系统里。</p><div class="tag-row"><span class="tag">Full Stack</span><span class="tag">AI Tools</span><span class="tag">OPC</span><span class="tag">GEO</span><span class="tag">Content System</span><span class="tag">Product Design</span></div></div><div class="panel off"><h2 class="panel-title">理念</h2><p class="panel-desc">不是教别人怎么成功，而是公开一个人如何判断、建造、失败、修正和变现。过程本身就是产品的一部分。</p><ul class="plain-list"><li>真实实践优先于概念包装</li><li>小而美优先于大而全</li><li>可复用工具优先于一次性表达</li></ul></div></div></section><section class="section alt"><div class="container">${sectionHeader('建设时间线','从内容库，到商业生态','长期主义，要有可见轨迹。')}<div class="timeline"><div class="time-item"><h3>内容资产</h3><p>以深度文章建立判断系统和长期搜索入口。</p></div><div class="time-item"><h3>工具封装</h3><p>将文章中的方法论逐步转化为 18 款 OPC 工具。</p></div><div class="time-item"><h3>课程系统</h3><p>把分散方法连接为完整的视频课程路径。</p></div><div class="time-item"><h3>会员生态</h3><p>用订阅、社群、报告和问答形成稳定商业闭环。</p></div></div></div></section>`}
    function contactPage(){return `${pageHead('联系 SOLO.X','合作、反馈、加入。','可用于商务合作、工具反馈、会员咨询、课程共创和媒体采访。','信')}<section class="section"><div class="container split"><div class="panel"><h2 class="panel-title">联系表单</h2><form class="form" data-form="contact"><input class="input" placeholder="你的称呼" required><input class="input" type="email" placeholder="邮箱" required><select class="select"><option>会员咨询</option><option>商务合作</option><option>工具反馈</option><option>课程共创</option><option>媒体采访</option></select><textarea class="textarea" placeholder="请用最少文字说明你的需求" required></textarea><label class="check"><input type="checkbox" required><span>我同意 SOLO.X 根据隐私政策处理以上信息。</span></label><button class="btn-sage" type="submit">提交</button><div class="form-note"></div></form></div><div class="panel off"><h2 class="panel-title">其他入口</h2><ul class="plain-list"><li>GitHub：查看公开项目与工具实验</li><li>Twitter：跟踪建设过程和短思考</li><li>邮箱：hello@solo-x.example</li><li>微信：加入候补名单后开放</li></ul></div></div></section>`}
    function opcxPage(){return `${pageHead('OPC METHOD','一人公司，不靠意志力运行。','OPC 是 SOLO.X 的核心方法论：One Person Company。它把定位、内容、工具、产品、分发和变现压成个人可承受的运营系统。','道')}<section class="section"><div class="container">${sectionHeader('落地页','从混乱动作，到稳定系统','先压缩，再放大。')}<div class="pathway"><div class="step"><div class="step-num">壹</div><h3>找母题</h3><p>明确你长期愿意研究、表达、产品化的核心问题。</p></div><div class="step"><div class="step-num">贰</div><h3>建资产</h3><p>把文章、视频、工具和案例沉淀到统一阵地。</p></div><div class="step"><div class="step-num">叁</div><h3>封工具</h3><p>把重复任务从人工动作变成可调用工具。</p></div><div class="step"><div class="step-num">肆</div><h3>做会员</h3><p>让不同深度用户进入对应权益层级。</p></div><div class="step"><div class="step-num">伍</div><h3>复盘迭代</h3><p>公开建设，持续修正，让过程成为信任资产。</p></div></div><div style="margin-top:2rem" class="button-row"><a class="btn-sage" href="#/pricing">加入会员</a><a class="btn-plain" href="#/tools">先看工具箱 →</a></div></div></section><section class="section alt"><div class="container">${sectionHeader('三层价值','不是灵感，是商业结构','表层有用，中层可复制，深层可信任。')}<div class="content-grid"><div class="ct-item"><span class="ct-index">表</span><div class="ct-type">SURFACE</div><h3 class="ct-name">内容与工具</h3><p class="ct-desc">240+ 内容和 18 款工具，一站式获取。</p></div><div class="ct-item"><span class="ct-index">中</span><div class="ct-type">SYSTEM</div><h3 class="ct-name">运营框架</h3><p class="ct-desc">从定位到产品到变现的全链路方法论。</p></div><div class="ct-item"><span class="ct-index">深</span><div class="ct-type">TRUST</div><h3 class="ct-name">真实样本</h3><p class="ct-desc">持续迭代、透明运营的一人公司实践。</p></div></div></div></section>`}
    function mapPage(){return `${pageHead('导航页','单文件中的完整网站。','所有页面、列表页、详情页、落地页和法律页都压缩在一个 HTML 文件中，通过 hash 路由切换。','图')}<section class="section"><div class="container"><div class="map-grid">${pages.map((p,i)=>`<a class="map-item" href="#/${p[0].includes('[')?(p[0].startsWith('article')?'article/one-person-company-operating-system':'tool/tool-1'):p[0]}"><div class="map-id">${String(i+1).padStart(2,'0')}</div><div class="map-name">${p[1]}</div><div class="map-path">#/${p[0]}</div><p class="map-desc">${p[2]}</p></a>`).join('')}</div></div></section>`}
    function legalPage(type){const isPrivacy=type==='privacy';return `${pageHead(isPrivacy?'PRIVACY':'TERMS',isPrivacy?'隐私政策':'使用条款',isPrivacy?'用于说明 SOLO.X 如何处理订阅、联系和会员相关信息。':'用于说明内容、工具、会员服务和责任边界。',isPrivacy?'隐':'法')}<div class="legal"><h2>${isPrivacy?'信息收集':'服务范围'}</h2><p>${isPrivacy?'SOLO.X 原型站点展示邮件订阅、联系表单和会员咨询入口。正式上线后，仅收集完成订阅、联系和服务交付所必需的信息。':'SOLO.X 提供文章、课程、工具、音乐、应用、游戏和会员服务。所有内容用于学习、研究和个人生产力提升，不构成法律、财务或投资建议。'}</p><h2>${isPrivacy?'使用目的':'会员权益'}</h2><p>${isPrivacy?'信息仅用于发送邮件、回复咨询、管理会员权益、改进产品体验和履行合规义务。用户可随时退订邮件或申请删除信息。':'会员权益以当前页面展示为准。免费、创作者和年度会员分别对应不同访问权限，平台可根据产品迭代调整权益说明。'}</p><h2>${isPrivacy?'用户权利':'内容版权'}</h2><ul><li>${isPrivacy?'访问、更正或删除个人信息。':'网站文章、工具说明、课程和视觉设计均归 SOLO.X 或对应权利人所有。'}</li><li>${isPrivacy?'取消订阅或撤回同意。':'未经授权，不得批量复制、转售、镜像或用于竞争性产品。'}</li><li>${isPrivacy?'请求说明信息处理规则。':'可在合理引用范围内分享链接和短摘录。'}</li></ul><h2>联系</h2><p>如需联系，请访问联系页提交表单或发送邮件至 hello@solo-x.example。</p></div>`}
    function notFound(){return `${pageHead('404','页面未找到。','这个路由不存在。你可以返回首页或查看导航页。','空')}<section class="section"><div class="container"><div class="button-row"><a class="btn-sage" href="#/home">返回首页</a><a class="btn-plain" href="#/map">查看导航页 →</a></div></div></section>`}
    function render(){const raw=(location.hash||'#/home').replace(/^#\/?/,'');const [page,param]=raw.split('/');let html='';if(page===''||page==='home')html=home();else if(page==='articles')html=renderArticles();else if(page==='article')html=renderArticle(param);else if(['music','courses','apps','webapps','games'].includes(page))html=catalogPage(page);else if(page==='course')html=courseDetail(param);else if(page==='tools')html=toolsPage();else if(page==='tool')html=toolDetail(param);else if(page==='pricing')html=pricingPage();else if(page==='about')html=aboutPage();else if(page==='contact')html=contactPage();else if(page==='opcx')html=opcxPage();else if(page==='map')html=mapPage();else if(page==='privacy'||page==='terms')html=legalPage(page);else html=notFound();const app=document.getElementById('app');app.innerHTML=html;app.focus({preventScroll:true});window.scrollTo({top:0,behavior:'instant'});setActive(page||'home');bindForms();bindArticleTabs();}
    function setActive(page){document.querySelectorAll('[data-nav]').forEach(a=>a.classList.toggle('active',a.dataset.nav===page));}
    function bindForms(){document.querySelectorAll('form[data-form]').forEach(form=>{form.addEventListener('submit',e=>{e.preventDefault();const note=form.querySelector('.form-note');if(note) note.textContent='已记录为原型交互。正式上线后接入 Resend / Server Actions。';});});}
    function bindArticleTabs(){const tabs=document.getElementById('articleTabs');if(!tabs)return;tabs.addEventListener('click',e=>{const btn=e.target.closest('[data-filter]');if(!btn)return;document.getElementById('app').innerHTML=renderArticles(btn.dataset.filter);bindArticleTabs();window.scrollTo({top:0,behavior:'smooth'});});}
    window.addEventListener('hashchange',render);
    render();
  </script>
